<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Transform your body, boost confidence and embrace your beauty.">
    <title>BodyLiftHub</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; padding:0; background:#f7f7f7; color:#333;}
        header {background:#ff6f61; color:#fff; text-align:center; padding:50px 20px;}
        header h1 {font-size:2.5em; margin:0;}
        header p {font-size:1.2em; margin:10px 0;}
        header .lang-buttons {margin-top:10px;}
        header button {margin:0 5px; padding:8px 15px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;}
        .container {max-width:1000px; margin:auto; padding:40px 20px;}
        h2 {text-align:center; margin-bottom:30px;}
        .categories button {margin:5px; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; background:#ff6f61; color:white;}
        .workouts {display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px;}
        .card {background:white; padding:20px; margin:10px; width:280px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); text-align:center;}
        .card a {display:block; margin-top:10px; color:#ff6f61; text-decoration:none; font-weight:bold;}
        footer {text-align:center; padding:30px 20px; background:#333; color:white; margin-top:50px;}
        iframe {width:100%; height:200px; border-radius:10px; margin-top:10px;}
    </style>
</head>
<body>

<header>
    <h1 id="site-title">BodyLiftHub</h1>
    <p id="site-desc">Трансформируй тело, повышай уверенность и полюби себя.</p>
    <div class="lang-buttons">
        <button onclick="setLang('ru')">RU</button>
        <button onclick="setLang('en')">EN</button>
    </div>
</header>

<div class="container">
    <h2 id="categories-title">Категории тренировок</h2>
    <div class="categories">
        <button onclick="showWorkouts('lower')">Lower Body</button>
        <button onclick="showWorkouts('upper')">Upper Body</button>
        <button onclick="showWorkouts('full')">Full Body</button>
    </div>

    <div id="workout-display" class="workouts">
        <p id="select-text">Выберите категорию, чтобы увидеть тренировки.</p>
    </div>
</div>

<footer>
    <p>© 2026 BodyLiftHub</p>
</footer>

<script>
const content = {
    ru: {
        title: "BodyLiftHub",
        desc: "Трансформируй тело, повышай уверенность и полюби себя.",
        categoriesTitle: "Категории тренировок",
        selectText: "Выберите категорию, чтобы увидеть тренировки.",
        workouts: {
            lower: [
                {name:"Приседания", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Выпады", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Мёртвая тяга", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
            ],
            upper: [
                {name:"Жим лежа", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Подтягивания", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Отжимания", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
            ],
            full: [
                {name:"Комплекс Full Body 1", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Комплекс Full Body 2", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Комплекс Full Body 3", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
            ]
        }
    },
    en: {
        title: "BodyLiftHub",
        desc: "Transform your body, boost confidence and embrace your beauty.",
        categoriesTitle: "Workout Categories",
        selectText: "Select a category to view workouts.",
        workouts: {
            lower: [
                {name:"Squats", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Lunges", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Deadlift", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
            ],
            upper: [
                {name:"Bench Press", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Pull-ups", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Push-ups", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
            ],
            full: [
                {name:"Full Body 1", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Full Body 2", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
                {name:"Full Body 3", video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
            ]
        }
    }
};

let currentLang = 'ru';

function setLang(lang) {
    currentLang = lang;
    document.getElementById('site-title').innerText = content[lang].title;
    document.getElementById('site-desc').innerText = content[lang].desc;
    document.getElementById('categories-title').innerText = content[lang].categoriesTitle;
    document.getElementById('select-text').innerText = content[lang].selectText;
    document.getElementById('workout-display').innerHTML = `<p>${content[lang].selectText}</p>`;
}

function showWorkouts(type) {
    const workouts = content[currentLang].workouts[type];
    const display = document.getElementById('workout-display');
    display.innerHTML = '';
    workouts.forEach(w => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h4>${w.name}</h4>
                          <iframe src="${w.video}" allowfullscreen></iframe>
                          <a href="${w.video}" target="_blank">Watch Video</a>`;
        display.appendChild(card);
    });
}
</script>

</body>
</html>
